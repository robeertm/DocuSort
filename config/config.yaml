# DocuSort main configuration.
# All paths below are INSIDE the Docker container – map them via docker-compose
# to the folders on your Synology (see README and docker-compose.yml).

paths:
  inbox: /data/inbox          # where new scans arrive
  library: /data/library      # where classified documents end up
  review: /data/library/_Review       # low-confidence documents for manual sorting
  processed: /data/library/_Processed # originals kept as a safety copy
  logs: /app/logs
  db: /data/library/docusort.db  # SQLite database, kept alongside the library

# Web UI
web:
  host: "0.0.0.0"             # 0.0.0.0 = listen on all interfaces inside the container
  port: 8080                  # exposed via docker-compose; open http://<nas>:8080
  default_language: "de"      # de / en / fr / es / it — falls back to browser Accept-Language

  # Optional HTTPS. Set both to PEM paths the docusort process can read
  # and the server starts in TLS mode on the same port. On Tailscale,
  # scripts/setup-tailscale-https.sh sets this up end-to-end.
  # ssl_cert: "/etc/docusort/certs/host.tailnet.ts.net.crt"
  # ssl_key:  "/etc/docusort/certs/host.tailnet.ts.net.key"

# Cloud sync (via rclone)
# 1. sudo apt install rclone (or brew install rclone)
# 2. rclone config  — set up an iCloud / Google Drive / Dropbox / OneDrive / S3 remote
# 3. Set `remote` below to <remote-name>:<path>, e.g. "icloud:DocuSort" or "gdrive:Documents/DocuSort"
# 4. Set `enabled: true` and restart.
# See https://rclone.org/docs/ for the complete list of supported cloud services.
sync:
  enabled: false
  remote: ""                   # e.g. "icloud:DocuSort-Backup"
  source: "library"            # 'library' (excludes _Trash) | 'library_and_trash'
  extra_flags: []              # e.g. ["--transfers=4", "--bwlimit=8M"]
  timeout_seconds: 1800        # kill rclone if it runs longer than this

# OCR settings (for scanned PDFs / images)
ocr:
  enabled: true
  languages: "deu+eng"        # Tesseract language packs, "deu+eng" or "deu"
  skip_if_text: true          # don't re-OCR PDFs that already have a text layer
  deskew: true                # straighten crooked scans before OCR

# Claude API settings
claude:
  model: "claude-haiku-4-5-20251001"  # fast & cheap; switch to claude-sonnet-4-6 for harder cases
  max_text_chars: 12000       # cap on how much text we send to the model
  min_confidence: 0.65        # below this, doc goes to _Review
  timeout_seconds: 60

# File handling
keep_original: true           # keep a copy of the untouched original in _Processed
filename_template: "{date}_{category}_{sender}_{subject}"
max_filename_length: 120
stable_seconds: 5             # wait this long after last write before processing

dry_run: false                # set true to test without actually moving files
